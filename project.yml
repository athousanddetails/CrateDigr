name: CrateDigr
options:
  bundleIdPrefix: com.gustavolima
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  CrateDigr:
    type: application
    platform: macOS
    sources:
      - path: CrateDigr
        excludes:
          - "Resources/Binaries/*"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gustavolima.CrateDigr
        PRODUCT_NAME: CrateDigr
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_ENTITLEMENTS: CrateDigr/CrateDigr.entitlements
        ARCHS: arm64
        VALID_ARCHS: arm64
        EXCLUDED_ARCHS: x86_64
    resources:
      - path: CrateDigr/Resources/Binaries
        buildPhase: resources
    postBuildScripts:
      - name: "Codesign Bundled Binaries"
        script: |
          BINARIES_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Binaries"
          if [ -d "$BINARIES_DIR" ]; then
            for binary in "$BINARIES_DIR"/*; do
              if [ -f "$binary" ]; then
                codesign --force --sign - "$binary" 2>/dev/null || true
              fi
            done
          fi
        basedOnDependencyAnalysis: false
